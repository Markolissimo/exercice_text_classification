name: Convert HF to CoreML

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch transformers coremltools sentencepiece

      - name: Convert model to CoreML
        run: |
          cd scripts
          python convert_to_coreml.py

      - name: Zip mlpackage
        run: |
          cd scripts
          ditto -c -k --sequesterRsrc --keepParent ExerciseClassifier.mlpackage ExerciseClassifier.mlpackage.zip

      - name: Zip tokenizer files
        run: |
          cd scripts
          ditto -c -k --sequesterRsrc --keepParent tokenizer_files tokenizer_files.zip

      - name: Upload CoreML model
        uses: actions/upload-artifact@v4
        with:
          name: ExerciseClassifier-CoreML
          path: scripts/ExerciseClassifier.mlpackage.zip

      - name: Upload tokenizer
        uses: actions/upload-artifact@v4
        with:
          name: ExerciseClassifier-Tokenizer
          path: scripts/tokenizer_files.zip
