name: Convert HF to CoreML

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "torch==2.5.0" "transformers==4.46.3" "coremltools==8.3.0" sentencepiece

      - name: Validate tool versions
        run: |
          python -c "import torch, coremltools as ct; print('torch', torch.__version__); print('coremltools', ct.__version__)"

      - name: Convert model to CoreML
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MODEL_ID: distilbert-base-uncased-finetuned-sst-2-english
        run: |
          cd scripts
          python convert_to_coreml.py

      - name: Upload CoreML model
        uses: actions/upload-artifact@v4
        with:
          name: ExerciseClassifier-CoreML
          path: scripts/ExerciseClassifier.mlpackage

      - name: Upload vocab.json
        uses: actions/upload-artifact@v4
        with:
          name: vocab
          path: scripts/vocab.json

      - name: Upload labels.json
        uses: actions/upload-artifact@v4
        with:
          name: labels
          path: scripts/labels.json
